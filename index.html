<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asignación Puertos – 11° Grado</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --card: #16161e;
            --accent: #22c55e;
            --line: #27272a;
            --text-p: #94a3b8;
            --text-h: #f8fafc;
            --danger: #ef4444;
        }

        body {
            margin: 0; padding: 0;
            background: var(--bg);
            color: white;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.focus-mode .sidebar-timeline { margin-left: -420px; opacity: 0; }
        body.focus-mode .info-card { max-width: 900px; transform: scale(1.1); }
        body.focus-mode .info-card h2 { font-size: 4.5rem; }
        body.focus-mode .focus-controls { opacity: 1; pointer-events: all; transform: translateY(0); }

        #autosave-indicator {
            position: fixed; top: 20px; right: 20px;
            font-size: 0.65rem; text-transform: uppercase;
            letter-spacing: 1px; color: var(--accent);
            opacity: 0; transition: opacity 0.5s ease; z-index: 100;
        }
        #autosave-indicator.show { opacity: 1; }

        .sidebar-timeline {
            width: 420px; min-width: 420px; background: var(--card);
            border-right: 1px solid var(--line); padding: 25px;
            overflow-y: auto; display: flex; flex-direction: column;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .progress-container { margin-bottom: 25px; background: var(--line); height: 6px; border-radius: 10px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: var(--accent); box-shadow: 0 0 10px var(--accent); transition: width 0.5s ease; }

        .header h1 { font-size: 1.4rem; margin: 0; color: var(--accent); text-transform: uppercase; }
        .sub-main { color: white; font-size: 0.8rem; opacity: 0.5; display: block; margin-bottom: 20px; }

        .timeline-wrapper { position: relative; margin-top: 10px; flex-grow: 1; }
        .timeline-wrapper::before {
            content: ''; position: absolute; left: 7px; top: 10px;
            width: 2px; height: calc(100% - 30px); background: var(--line);
        }

        .step { position: relative; padding-left: 35px; margin-bottom: 40px; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; }
        .step:not(.active) { opacity: 0.6; }
        .step.active { transform: translateX(5px); opacity: 1; }
        .step::before {
            content: ''; position: absolute; left: 0; top: 5px;
            width: 14px; height: 14px; border-radius: 50%;
            background: var(--line); border: 3px solid var(--card); z-index: 2;
        }
        .step.active::before { background: var(--accent); box-shadow: 0 0 15px var(--accent); }
        .step.completed::after { content: '✓'; position: absolute; left: 2px; top: 4px; font-size: 10px; font-weight: bold; color: var(--bg); z-index: 3; }

        .step-content { flex: 1; }
        .step .tag { font-size: 0.65rem; color: var(--accent); font-weight: 800; text-transform: uppercase; }
        .step h4 { margin: 5px 0; font-size: 1rem; color: var(--text-h); }
        .step p { font-size: 0.8rem; color: var(--text-p); line-height: 1.4; margin: 0; }

        .step-thumb { 
            width: 50px; height: 50px; border-radius: 4px; 
            background: var(--line); margin-top: 10px; 
            object-fit: cover; border: 1px solid var(--line);
        }

        .step-actions { display: flex; gap: 12px; margin-top: 10px; opacity: 0; transition: 0.2s; }
        .step:hover .step-actions, .step.active .step-actions { opacity: 1; }
        
        .mini-btn { background: none; border: none; color: var(--text-p); font-size: 0.6rem; text-transform: uppercase; cursor: pointer; padding: 0; font-weight: 600; transition: 0.2s; }
        .mini-btn:hover { color: var(--accent); }
        .mini-btn.del:hover { color: var(--danger); }

        .export-group { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .global-actions { padding-top: 20px; border-top: 1px solid var(--line); display: flex; flex-direction: column; gap: 10px; }

        .detail-view { flex: 1; display: flex; align-items: center; justify-content: center; padding: 60px; background: radial-gradient(circle at center, #1a1a24 0%, #0a0a0c 100%); position: relative; }
        .info-card { max-width: 650px; border-left: 4px solid var(--accent); padding-left: 35px; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .info-card h2 { font-size: 3rem; margin: 0 0 15px 0; transition: font-size 0.5s ease; }
        .info-card .question { font-size: 1.4rem; color: #cbd5e1; line-height: 1.6; font-style: italic; }
        
        .detail-img { 
            width: 100%; max-height: 300px; object-fit: cover; 
            border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--line);
            display: none;
        }
        .detail-img.show { display: block; }

        .status-toggle { margin-top: 20px; display: flex; align-items: center; gap: 10px; font-size: 0.8rem; color: var(--accent); cursor: pointer; }
        .focus-toggle-btn { position: absolute; top: 30px; left: 30px; background: none; border: 1px solid var(--line); color: var(--text-p); padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; text-transform: uppercase; transition: 0.3s; }
        .focus-toggle-btn:hover { border-color: var(--accent); color: var(--accent); }

        .focus-controls {
            position: absolute; bottom: 40px; right: 40px;
            display: flex; gap: 15px; opacity: 0; pointer-events: none;
            transform: translateY(10px); transition: 0.4s ease;
        }
        .nav-btn {
            background: var(--card); border: 1px solid var(--line);
            color: var(--text-p); padding: 10px 15px; border-radius: 4px;
            cursor: pointer; font-size: 0.65rem; text-transform: uppercase;
            letter-spacing: 1px; transition: 0.3s;
        }
        .nav-btn:hover { border-color: var(--accent); color: var(--accent); }

        [contenteditable="true"] { border-bottom: 1px dashed transparent; outline: none; transition: 0.3s; }
        [contenteditable="true"]:hover, [contenteditable="true"]:focus { border-bottom-color: var(--accent); background: rgba(34, 197, 94, 0.05); }
    </style>
</head>
<body>

<div id="autosave-indicator">● Cambios guardados</div>

<div class="sidebar-timeline">
    <div class="progress-container"><div id="progress-bar"></div></div>
    <div class="header">
        <h1 id="main-title" contenteditable="true" onblur="saveData()">ASIGNACIÓN INFORMÁTICA</h1>
        <span id="main-subtitle" class="sub-main" contenteditable="true" onblur="saveData()">11° Grado · Redes y Tecnología</span>
    </div>
    <div class="timeline-wrapper" id="lista-pasos"></div>
    <div class="global-actions">
        <button class="mini-btn" style="text-align: left;" onclick="addNewHito()">+ Añadir hito</button>
        <div class="export-group">
            <span style="font-size: 0.6rem; color: var(--line); font-weight: bold; width: 100%;">EXPORTAR:</span>
            <button class="mini-btn" onclick="exportData('json')">JSON</button>
            <button class="mini-btn" onclick="exportData('pdf')">PDF</button>
            <button class="mini-btn" onclick="exportData('word')">DOC</button>
            <button class="mini-btn" onclick="exportData('excel')">XLS</button>
            <button class="mini-btn" onclick="exportData('txt')">TXT</button>
        </div>
    </div>
</div>

<div class="detail-view">
    <button class="focus-toggle-btn" onclick="toggleFocus()">Modo Foco</button>
    <div class="info-card" id="display">
        <img id="display-img" class="detail-img" src="" alt="Hito preview">
        <h2 id="display-title">Selecciona un paso</h2>
        <p class="question" id="display-q">Haz clic en un paso para ver las instrucciones.</p>
        <div id="status-area"></div>
    </div>
    
    <div class="focus-controls">
        <button class="nav-btn" onclick="navigateHito(-1)">Anterior</button>
        <button class="nav-btn" onclick="navigateHito(1)">Siguiente</button>
    </div>
</div>

<script>
    const STORAGE_KEY = 'asignacionPuertos_v1';
    let currentHitoIndex = 0;
    let appData = {
        mainTitle: "ASIGNACIÓN INFORMÁTICA",
        mainSubtitle: "11° Grado · Redes y Tecnología",
        hitos: [
            {
                tag: "PASO 1",
                titulo: "Conoce tu propia IP",
                resumen: "Abre CMD y ejecuta ipconfig para ver tu dirección en la red.",
                pregunta: "Abre el Símbolo del sistema: Inicio → Buscar → CMD → Enter.\n\nEscribe el comando y presiona Enter:\n\nipconfig\n\nBusca la línea 'Dirección IPv4'. Anota tu IP y el rango de red (ej: 192.168.10.x).\n\n💡 Si tu IP es 192.168.10.45, el rango es 192.168.10.0/24. Todos los equipos conectados tienen una IP en ese rango.\n\n✏️ Escribe aquí tu IP y rango encontrado:",
                done: false,
                img: ""
            },
            {
                tag: "PASO 2",
                titulo: "Escanea toda la red",
                resumen: "Envía ping automático a todas las IPs posibles del rango de red.",
                pregunta: "Ejecuta este comando en CMD:\n\nfor /L %i in (1,1,254) do @ping -n 1 -w 100 192.168.10.%i | find \"TTL=\"\n\n¿Qué hace?\n• Prueba automáticamente las IPs .1 hasta .254\n• -w 100 espera solo 100ms por respuesta (rápido)\n• Solo muestra las IPs que respondieron\n\n💡 Espera a que termine. Verás varias IPs aparecer.\n\n✏️ Anota aquí todas las IPs que respondieron:",
                done: false,
                img: ""
            },
            {
                tag: "PASO 3",
                titulo: "Identifica la Raspberry Pi",
                resumen: "Distingue el servidor Ubuntu por el valor TTL en las respuestas.",
                pregunta: "Fíjate en el valor TTL de cada respuesta:\n\n• Windows → TTL = 128 ❌ No es el servidor\n• Linux / Ubuntu → TTL = 64 ✅ Sí es el servidor\n• Router → TTL = 64 o 255 (posible)\n\nTambién puedes usar:\n\narp -a\n\nBusca la IP con TTL=64 que no sea el router.\n\n📌 Esta será tu IP_SERVIDOR para todos los pasos siguientes.\n\n✏️ Escribe aquí la IP del servidor que identificaste:",
                done: false,
                img: ""
            },
            {
                tag: "PASO 4",
                titulo: "Verificar Conectividad",
                resumen: "Confirma comunicación con el servidor antes de continuar.",
                pregunta: "Ejecuta en CMD (reemplaza con la IP real):\n\nping IP_SERVIDOR\n\nEjemplo: ping 192.168.10.50\n\nInterpreta los resultados:\n✅ Conectado → Respuestas con tiempo en ms\n❌ Sin conectividad → 'Tiempo de espera agotado'\n\n⚠️ Si no recibes respuesta, avisa al profesor antes de continuar. Sin conectividad no podrás hacer los pasos siguientes.\n\n✏️ Escribe aquí el resultado del ping:",
                done: false,
                img: ""
            },
            {
                tag: "PASO 5",
                titulo: "Descubrimiento de Puertos",
                resumen: "Usa Telnet para 'tocar' cada puerto y ver cuáles están abiertos.",
                pregunta: "Un puerto es como una puerta numerada. Sintaxis:\n\ntelnet IP_SERVIDOR NÚMERO_PUERTO\n\nPuertos que debes probar:\n• telnet IP_SERVIDOR 21   → \n• telnet IP_SERVIDOR 22   → \n• telnet IP_SERVIDOR 80   → \n• telnet IP_SERVIDOR 443  → \n• telnet IP_SERVIDOR 3306 → \n• telnet IP_SERVIDOR 8080 → \n• telnet IP_SERVIDOR 445 → \n• telnet IP_SERVIDOR 139 →  \n\n✅ ABIERTO → pantalla negra o texto del servicio\n❌ CERRADO → 'No se puede abrir conexión...'\n\n💡 Para cerrar Telnet: Ctrl+] y luego escribe quit\n\n✏️ Anota aquí los resultados (Abierto/Cerrado) de cada puerto:",
                done: false,
                img: ""
            },
            {
                tag: "PASO 6",
                titulo: "Completar Tabla de Investigación",
                resumen: "Registra todos tus hallazgos en la tabla de puertos y servicios.",
                pregunta: "Completa la tabla con tus resultados. Columnas:\n| IP del Servidor | Puerto | Estado | Posible Servicio | ¿Cómo acceder? |\n\nEjemplo (ya dado):\n192.168.1.50 | 80 | Abierto | Servidor Web HTTP | Navegador: http://192.168.10.50\n\n✏️ Escribe aquí tu tabla completa:",
                done: false,
                img: ""
            },
            {
                tag: "PASO 7",
                titulo: "Preguntas de Análisis",
                resumen: "Responde 6 preguntas con tus propias palabras.",
                pregunta: "Responde cada pregunta con lo que aprendiste hoy. No copies de internet.\n\n1. ¿Qué es una dirección IP?\n\n2. ¿Qué es un puerto de red?\n\n3. ¿Qué significa que un puerto esté abierto?\n\n4. ¿Qué función tiene un servidor en una red?\n\n5. ¿Qué riesgos existen si un servidor tiene demasiados puertos abiertos?\n\n6. ¿Por qué es importante conocer los servicios activos en un servidor?\n\n✏️ Escribe aquí tus respuestas:",
                done: false,
                img: ""
            },
            {
                tag: "PASO 8",
                titulo: "Evidencias y Conclusión Final",
                resumen: "Reúne todo para entregar la asignación completa.",
                pregunta: "Tu entrega debe incluir:\n\n📸 Capturas de pantalla del CMD con cada comando y su resultado\n🔍 La IP del servidor que encontraste y cómo la identificaste\n📋 La tabla del Paso 6 completada con todos los puertos probados\n💬 Respuestas a las 6 preguntas de análisis\n✍️ Conclusión personal: ¿qué aprendiste? ¿qué te sorprendió? ¿para qué sirve en la vida real?\n\n⚠️ IMPORTANTE: Esta actividad se realiza ÚNICAMENTE dentro de la red local del salón. Está prohibido intentar acceder a equipos fuera del laboratorio.\n\n¡Buena suerte! Un buen Profecional no adivina — investiga. 🔎",
                done: false,
                img: ""
            }
        ]
    };

    function init() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) appData = JSON.parse(saved);
        render();
        selectStep(0);
        document.addEventListener('keydown', (e) => {
            if (document.body.classList.contains('focus-mode')) {
                if (e.key === "ArrowRight" || e.key === "ArrowDown") navigateHito(1);
                if (e.key === "ArrowLeft" || e.key === "ArrowUp") navigateHito(-1);
            }
        });
    }

    function toggleFocus() {
        document.body.classList.toggle('focus-mode');
        document.querySelector('.focus-toggle-btn').innerText = document.body.classList.contains('focus-mode') ? 'Ver Sidebar' : 'Modo Foco';
    }

    function navigateHito(direction) {
        let newIndex = currentHitoIndex + direction;
        if (newIndex >= 0 && newIndex < appData.hitos.length) selectStep(newIndex);
    }

    function showSaveFeedback() {
        const indicator = document.getElementById('autosave-indicator');
        indicator.classList.add('show');
        setTimeout(() => indicator.classList.remove('show'), 2000);
    }

    function saveData() {
        appData.mainTitle = document.getElementById('main-title').innerText;
        appData.mainSubtitle = document.getElementById('main-subtitle').innerText;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
        updateProgress();
        showSaveFeedback();
    }

    function render() {
        document.getElementById('main-title').innerText = appData.mainTitle;
        document.getElementById('main-subtitle').innerText = appData.mainSubtitle;
        const contenedor = document.getElementById('lista-pasos');
        contenedor.innerHTML = '';
        appData.hitos.forEach((h, i) => {
            const step = document.createElement('div');
            step.className = `step ${h.done ? 'completed' : ''}`;
            step.onclick = (e) => { if (e.target.contentEditable !== "true" && !e.target.classList.contains('mini-btn')) selectStep(i); };
            let imgHtml = h.img ? `<img src="${h.img}" class="step-thumb">` : '';
            step.innerHTML = `
                <div class="step-content">
                    <span class="tag" contenteditable="true" onblur="updateHito(${i}, 'tag', this.innerText)">${h.tag}</span>
                    <h4 contenteditable="true" onblur="updateHito(${i}, 'titulo', this.innerText)">${h.titulo}</h4>
                    <p contenteditable="true" onblur="updateHito(${i}, 'resumen', this.innerText)">${h.resumen}</p>
                    ${imgHtml}
                </div>
                <div class="step-actions">
                    <button class="mini-btn" onclick="toggleStatus(${i})">${h.done ? 'Pendiente' : 'Completar'}</button>
                    <button class="mini-btn" onclick="manageImg(${i})">Imagen</button>
                    <button class="mini-btn del" onclick="deleteHito(${i})">Eliminar</button>
                </div>
            `;
            contenedor.appendChild(step);
        });
        updateProgress();
    }

    function selectStep(index) {
        currentHitoIndex = index;
        document.querySelectorAll('.step').forEach((s, i) => s.classList.toggle('active', i === index));
        const h = appData.hitos[index];
        if (!h) return;
        const displayImg = document.getElementById('display-img');
        if (h.img) { displayImg.src = h.img; displayImg.classList.add('show'); }
        else { displayImg.classList.remove('show'); }
        document.getElementById('display-title').innerText = h.titulo;
        document.getElementById('display-q').innerText = h.pregunta;
        document.getElementById('display-q').style.whiteSpace = 'pre-line';
        document.getElementById('status-area').innerHTML = `
            <div class="status-toggle" onclick="toggleStatus(${index})">${h.done ? '● Completado' : '○ Marcar como completado'}</div>
            <p style="font-size:0.8rem;opacity:0.5;margin-top:25px;">Instrucciones / Espacio de trabajo:<br>
                <span id="edit-q" contenteditable="true" onblur="updateHito(${index},'pregunta',this.innerText)" style="display:inline-block;margin-top:5px;color:var(--text-h);white-space:pre-line;">${h.pregunta}</span>
            </p>
        `;
    }

    function manageImg(index) {
        const hasImg = !!appData.hitos[index].img;
        if (hasImg) {
            const choice = confirm("ACEPTAR para cambiar la imagen, CANCELAR para eliminarla.");
            if (!choice) { appData.hitos[index].img = ""; saveData(); render(); selectStep(index); return; }
        }
        const url = prompt("Pega la URL de la nueva imagen:", appData.hitos[index].img || "");
        if (url !== null && url.trim() !== "") { appData.hitos[index].img = url.trim(); saveData(); render(); selectStep(index); }
    }

    function updateHito(index, field, value) { appData.hitos[index][field] = value; saveData(); }

    function toggleStatus(index) { appData.hitos[index].done = !appData.hitos[index].done; saveData(); render(); selectStep(index); }

    function addNewHito() { appData.hitos.push({ tag: "NUEVO", titulo: "Título", resumen: "Resumen...", pregunta: "Instrucciones...", done: false, img: "" }); saveData(); render(); }

    function deleteHito(index) { if (confirm('¿Borrar este paso?')) { appData.hitos.splice(index, 1); saveData(); render(); } }

    function updateProgress() {
        if (appData.hitos.length === 0) return;
        const done = appData.hitos.filter(h => h.done).length;
        document.getElementById('progress-bar').style.width = (done / appData.hitos.length * 100) + '%';
    }

    function exportData(format) {
        const title = appData.mainTitle;
        if (format === 'pdf') {
            const printWindow = window.open('', '_blank');
            const htmlContent = `<html><head><title>PDF</title><style>body{font-family:sans-serif;padding:40px;}h1{color:#22c55e;}.hito{margin-bottom:20px;border-bottom:1px solid #eee;padding-bottom:10px;}</style></head>
                <body><h1>${title}</h1><p>${appData.mainSubtitle}</p><hr>
                ${appData.hitos.map(h => `<div class="hito"><p><strong>[${h.done?'OK':'-'}] ${h.tag}</strong></p><h3>${h.titulo}</h3><p>${h.resumen}</p></div>`).join('')}
                </body></html>`;
            printWindow.document.write(htmlContent);
            printWindow.document.close();
            printWindow.print();
            return;
        }
        let content = `${title}\n${appData.mainSubtitle}\n\n`;
        appData.hitos.forEach(h => { content += `[${h.done ? 'X' : ' '}] ${h.tag}: ${h.titulo}\nResumen: ${h.resumen}\n\n`; });
        let blob, fileName;
        switch(format) {
            case 'json': blob = new Blob([JSON.stringify(appData, null, 2)], {type:'application/json'}); fileName='asignacion.json'; break;
            case 'txt': blob = new Blob([content], {type:'text/plain'}); fileName='asignacion.txt'; break;
            case 'word': blob = new Blob([`<html><body>${content.replace(/\n/g,'<br>')}</body></html>`], {type:'application/msword'}); fileName='asignacion.doc'; break;
            case 'excel': let csv='Tag,Titulo,Resumen\n'; appData.hitos.forEach(h=>csv+=`"${h.tag}","${h.titulo}","${h.resumen}"\n`); blob=new Blob([csv],{type:'text/csv'}); fileName='asignacion.csv'; break;
        }
        const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = fileName; link.click();
    }

    init();
</script>
</body>
</html>
